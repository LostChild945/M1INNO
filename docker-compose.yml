version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infra/docker/Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_secret@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIe3aY=
    AIRFLOW__WEBSERVER__SECRET_KEY: agritech_webserver_secret
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow/src
    DOCKER_HOST: unix:///var/run/docker.sock
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - agritech-net

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — données projet
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: agritech-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agritech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agritech_secret}
      POSTGRES_DB: ${POSTGRES_DB:-agritech}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agritech}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agritech-net

  # ─────────────────────────────────────────────
  # PostgreSQL — métadonnées Airflow
  # ─────────────────────────────────────────────
  postgres-airflow:
    image: postgres:16
    container_name: agritech-postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_secret
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agritech-net

  # ─────────────────────────────────────────────
  # PostgreSQL — backend MLflow
  # ─────────────────────────────────────────────
  postgres-mlflow:
    image: postgres:16
    container_name: agritech-postgres-mlflow
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow_secret
      POSTGRES_DB: mlflow
    volumes:
      - postgres-mlflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agritech-net

  # ─────────────────────────────────────────────
  # Apache Spark — Master
  # ─────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: agritech-spark-master
    user: root
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    ports:
      - "8080:8080"   # Spark UI
      - "7077:7077"   # Spark master port
    volumes:
      - ./src:/opt/spark/work-dir/src
      - ./data:/opt/spark/work-dir/data
    networks:
      - agritech-net

  # ─────────────────────────────────────────────
  # Apache Spark — Worker
  # ─────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.3
    container_name: agritech-spark-worker
    user: root
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 6g
      SPARK_WORKER_CORES: "4"
    volumes:
      - ./src:/opt/spark/work-dir/src
      - ./data:/opt/spark/work-dir/data
    depends_on:
      - spark-master
    networks:
      - agritech-net

  # ─────────────────────────────────────────────
  # MLflow — tracking server
  # ─────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mlflow
    container_name: agritech-mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow_secret@postgres-mlflow:5432/mlflow
      --default-artifact-root /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres-mlflow:
        condition: service_healthy
    networks:
      - agritech-net

  # ─────────────────────────────────────────────
  # Airflow — initialisation DB (one-shot)
  # ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: agritech-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@agritech.local
    restart: "no"

  # ─────────────────────────────────────────────
  # Airflow — scheduler
  # ─────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: agritech-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────
  # Airflow — webserver
  # ─────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: agritech-airflow-webserver
    command: webserver
    ports:
      - "8081:8080"   # Airflow UI (8080 pris par Spark)
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────────
  # FastAPI — API de prédiction
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: agritech-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-agritech}:${POSTGRES_PASSWORD:-agritech_secret}@postgres:5432/${POSTGRES_DB:-agritech}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - agritech-net
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Streamlit — dashboard
  # ─────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
    container_name: agritech-dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-agritech}:${POSTGRES_PASSWORD:-agritech_secret}@postgres:5432/${POSTGRES_DB:-agritech}
    volumes:
      - ./src:/app/src
    depends_on:
      - api
    networks:
      - agritech-net
    restart: unless-stopped

# ─────────────────────────────────────────────
# Volumes persistants
# ─────────────────────────────────────────────
volumes:
  postgres-data:
  postgres-airflow-data:
  postgres-mlflow-data:
  mlflow-artifacts:
  airflow-logs:
  airflow-plugins:

# ─────────────────────────────────────────────
# Réseau interne
# ─────────────────────────────────────────────
networks:
  agritech-net:
    driver: bridge
